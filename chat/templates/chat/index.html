<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Chetan</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;height:100vh;}.chat-container{background:white;width:420px;height:600px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);display:flex;flex-direction:column;overflow:hidden;}.chat-header{background:#4a90d9;color:white;padding:16px 20px;font-size:18px;font-weight:bold;}.chat-header span{font-size:13px;font-weight:normal;opacity:0.85;display:block;}.mood-indicator{font-size:12px;background:rgba(255,255,255,0.2);display:inline-block;padding:2px 8px;border-radius:10px;margin-top:4px;}.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}.message{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;}.message.user{background:#4a90d9;color:white;align-self:flex-end;}.message.bot{background:#f0f2f5;color:#333;align-self:flex-start;}.chat-input{display:flex;padding:12px;border-top:1px solid #eee;gap:8px;}.mood-select{padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;}.chat-input input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;font-size:14px;outline:none;}.chat-input button{background:#4a90d9;color:white;border:none;padding:10px 16px;border-radius:20px;cursor:pointer;font-size:14px;}</style></head><body><div class='chat-container'><div class='chat-header'>Chetan<span>Your mental health companion</span><span class='mood-indicator' id='moodDisplay'>Mood: Neutral</span></div><div class='chat-messages' id='messages'><div class='message bot'>Hi, I am Chetan. How are you feeling today? Share what is on your mind.</div></div><div class='chat-input'><select class='mood-select' id='mood'><option value='neutral'>Neutral</option><option value='happy'>Happy</option><option value='sad'>Sad</option><option value='anxious'>Anxious</option><option value='angry'>Angry</option><option value='stressed'>Stressed</option></select><input type='text' id='userInput' placeholder='Type a message...'/><button onclick='sendMessage()'>Send</button></div></div><script>const messagesDiv=document.getElementById('messages');const input=document.getElementById('userInput');const mood=document.getElementById('mood');const moodDisplay=document.getElementById('moodDisplay');const moodEmojis={neutral:'Neutral',happy:'Happy',sad:'Sad',anxious:'Anxious',angry:'Angry',stressed:'Stressed'};input.addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});function detectMood(text){text=text.toLowerCase();if(/angry|frustrated|mad|furious|annoyed|hate|rage/.test(text))return 'angry';if(/stressed|overwhelmed|pressure|panic|deadline|burnout|exhausted/.test(text))return 'stressed';if(/sad|cry|depressed|unhappy|lonely|miss|heartbroken|tears/.test(text))return 'sad';if(/anxious|nervous|worried|scared|fear|anxiety|tense/.test(text))return 'anxious';if(/happy|great|excited|good|amazing|wonderful|joy|love|blessed/.test(text))return 'happy';return 'neutral';}function addMessage(text,sender){const div=document.createElement('div');div.className='message '+sender;div.textContent=text;messagesDiv.appendChild(div);messagesDiv.scrollTop=messagesDiv.scrollHeight;}async function sendMessage(){const text=input.value.trim();if(!text)return;const detectedMood=detectMood(text);mood.value=detectedMood;moodDisplay.textContent='Mood: '+moodEmojis[detectedMood];addMessage(text,'user');input.value='';addMessage('Thinking...','bot');try{const res=await fetch('/send/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,mood:detectedMood})});const data=await res.json();messagesDiv.lastChild.textContent=data.reply||data.error;}catch(err){messagesDiv.lastChild.textContent='Connection error. Try again.';}};</script></body></html>
